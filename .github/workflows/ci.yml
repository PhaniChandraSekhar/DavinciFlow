name: CI

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: davinciflow/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Run backend tests
        env:
          DAVINCIFLOW_DATABASE_URL: sqlite+aiosqlite:///./ci-test.db
          DAVINCIFLOW_CORS_ORIGINS: http://localhost:3000
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: davinciflow/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: davinciflow/frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Typecheck frontend
        run: npx tsc --noEmit
