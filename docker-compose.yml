version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: davinciflow
      POSTGRES_USER: davinciflow
      POSTGRES_PASSWORD: davinciflow
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address :9001
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./davinciflow/backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    env_file:
      - .env
    volumes:
      - ./davinciflow/backend:/app

  frontend:
    build:
      context: ./davinciflow/frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

networks:
  default:
    driver: bridge

volumes:
  pgdata:
  minio_data:
